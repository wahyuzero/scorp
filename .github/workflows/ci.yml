name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install CGO dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Vet
        run: go vet ./...

      - name: Build
        env:
          CGO_ENABLED: 1
        run: go build -tags fts5 -o /dev/null .

      - name: Test
        env:
          CGO_ENABLED: 1
        run: go test -tags fts5 ./... -timeout 60s
